services:
  - type: web
    name: karma-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: karma-frontend
    env: node
    region: oregon
    plan: free
    staticSite: true
    buildCommand: cd client && npm install && npm run build
    publishPath: client/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://karma-backend.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://karma-backend.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: ""
