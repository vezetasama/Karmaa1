<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="50%" stop-color="#0D3B66"/>
      <stop offset="100%" stop-color="#1E90FF"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E90FF"/>
      <stop offset="100%" stop-color="#00BFFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1E90FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Glow -->
  <ellipse cx="600" cy="200" rx="500" ry="180" fill="url(#glow)"/>

  <!-- Decorative hexagons -->
  <g opacity="0.06" fill="#fff">
    <polygon points="80,60 100,48 120,60 120,84 100,96 80,84"/>
    <polygon points="1080,80 1100,68 1120,80 1120,104 1100,116 1080,104"/>
    <polygon points="60,320 80,308 100,320 100,344 80,356 60,344"/>
    <polygon points="1120,300 1140,288 1160,300 1160,324 1140,336 1120,324"/>
    <polygon points="300,40 320,28 340,40 340,64 320,76 300,64"/>
    <polygon points="900,350 920,338 940,350 940,374 920,386 900,374"/>
  </g>

  <!-- Accent lines -->
  <line x1="80" y1="380" x2="1120" y2="380" stroke="url(#accentGrad)" stroke-width="2" opacity="0.5"/>

  <!-- Stylized M Logo -->
  <g transform="translate(600, 160)">
    <path d="M-70,-60 L-70,60 L-35,60 L-35,-15 L0,35 L35,-15 L35,60 L70,60 L70,-60 L35,-60 L0,-10 L-35,-60 Z" fill="url(#accentGrad)"/>
    <path d="M-70,-60 L-35,-60 L0,-10 L35,-60 L70,-60 L70,-45 L35,-45 L0,5 L-35,-45 L-70,-45 Z" fill="#fff" opacity="0.25"/>
  </g>

  <!-- Diamond -->
  <g transform="translate(600, 255)">
    <polygon points="0,-14 16,0 0,14 -16,0" fill="#1E90FF" opacity="0.8"/>
    <polygon points="0,-10 12,0 0,10 -12,0" fill="#00BFFF" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="600" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#fff" letter-spacing="3">MOBILE LEGENDS</text>
  <text x="600" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#87CEEB" letter-spacing="5">BANG BANG</text>
  <text x="600" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#fff" opacity="0.4" letter-spacing="2">KARMA</text>
</svg>
